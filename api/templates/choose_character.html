{% include 'header.html' %}

    <H1 class="h1">ELIJA A SU HÉROE Y PREPARESE PARA PELEAR</H1>
    <div class="local-form">
    <form action="{{ url_for('start_fight') }}" method="get">
    <table class="table bg-info">
        <tr>
            <th>
                <h2 class="h2-hero">PERSONAJE PRINCIPAL</h2>
            </th>
        </tr>
        <tr>
            <td>
                <label for="jugador">Elegí tu Héroe</label>
                <select name="jugador" id="jugador">
                    {% for hero in hero_db %}
                        <option value="{{ hero.get_name() }}">
                            {{ hero.get_name() }}
                        </option>
                    {% endfor %}
                </select>
                <button type="submit" class="button-chose-character">
                    Elegir Héroe
                </button>
            </td>
        </tr>
    </table>
    </form>
</div>
{% include 'footer.html' %}
